# DeutschFlow — Testcontainers defaults for local dev (macOS + Linux CI).
#
# Docker Desktop on macOS sometimes fails via DockerDesktopClientProviderStrategy
# (HTTP 400 / empty engine info). Forcing the Unix socket strategy uses the same
# socket as `docker` CLI and is usually stable.
docker.client.strategy=org.testcontainers.dockerclient.UnixSocketClientProviderStrategy

# Colima / rootless: set in your shell or ~/.zshrc, e.g.:
#   export DOCKER_HOST=unix://$HOME/.colima/default/docker.sock
# or Docker Desktop user socket:
#   export DOCKER_HOST=unix://$HOME/.docker/run/docker.sock
