spring:
  datasource:
    url: jdbc:h2:mem:deutschflow;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

app:
  jwt:
    secret: test-secret-key-with-at-least-32-bytes!!
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  speaking:
    adaptive:
      enabled: true
  vocabulary:
    goethe:
      auto-import-on-startup: false
      official-wordlist:
        auto-import-on-startup: false
    cefr-curated:
      auto-import-on-startup: false
      enrich-after-upsert: false
