# ============================================================
# DeutschFlow Backend — Base Configuration
# Primary database: PostgreSQL (jdbc:postgresql, Flyway classpath:db/migration).
# Các secret KHÔNG được hardcode ở đây — dùng profile-specific yml + .env (DB_*, JWT_*, …).
# ============================================================

# springdoc/OpenAPI: default response media type → application/json, so endpoints that don't
# declare `produces` still emit `application/json` content (not `*/*`). This lets
# swift-openapi-generator emit TYPED response bodies (.json) for the native iOS client instead of
# opaque */* HTTPBody. Binary endpoints declare their own media type via @ApiResponse.
springdoc:
  default-produces-media-type: application/json

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:}
    region: ${AWS_S3_REGION:ap-southeast-1}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

spring:
  application:
    name: deutschflow-backend

  # ── Email / SMTP (for password-reset OTP) ─────────────────────────────────
  # Set MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD in your .env.
  # Recommended: Gmail SMTP (smtp.gmail.com:587) or AWS SES.
  # Leave MAIL_HOST empty to disable email sending (OTP is logged at DEBUG level).
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  jackson:
    # Serialize LocalDateTime/Instant as ISO-8601 string, not as numeric timestamp.
    # Required for GlobalExceptionHandler.ProblemDetail.timestamp (LocalDateTime) to serialize correctly.
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Graceful shutdown: Spring Boot stops accepting new requests immediately
  # but waits for in-flight requests to complete before shutting down.
  # This pairs with `docker stop --time=30` in the Blue-Green deploy script.
  lifecycle:
    timeout-per-shutdown-phase: 25s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Redis here is BEST-EFFORT: the shared rate-limit window (AuthRateLimiterService) and the
      # optional L2 cache both degrade gracefully to in-process fallbacks when it's unreachable.
      # The trap: with no explicit timeout, Lettuce blocks ~5s on a dead/unreachable Redis before the
      # fallback can kick in. That blocking call is the FIRST thing /api/auth/login does (rate-limit
      # check), so an unreachable Redis turned every login into a ~6s HTTP 500 (and dragged the
      # health check to DOWN). Fail fast → the graceful fallback runs immediately, login stays sub-second.
      timeout: ${REDIS_TIMEOUT:300ms}            # command timeout
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:300ms}  # socket connect timeout


  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?stringtype=unspecified&tcpKeepAlive=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    # Larger default pool helps when vocab schedulers + API share the JVM; tune via DB_POOL_* env.
    # "Failed to obtain JDBC Connection" + ~30s timeouts often mean Postgres down/saturated or pool exhausted.
    hikari:
      pool-name: DeutschFlowPool
      # P1-6: default raised 10→20; 2026-07-09 raised 20→30 as headroom after the OSIV/SSE pool-exhaustion
      # outage (real fix is open-in-view=false above; 30 is the pre-vetted checklist target).
      # Blue-green deploy briefly runs TWO instances, so effective peak ≈ 2× this against RDS max_connections:
      # 2×30 = 60 < ~112 (db.t4g.micro). Confirm the RDS instance class before raising further.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:5000}
      # Recycle idle connections nhanh hơn để tránh RDS drop stale conn
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:180000}
      # Renew connection trước khi RDS max_lifetime (AWS default 8h)
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:600000}
      # Keepalive 30s — AWS RDS idle TCP timeout thường 300s, giữ conn sống
      keepalive-time: ${DB_POOL_KEEPALIVE_MS:30000}
      # Validate trước khi dùng — phát hiện stale conn ngay
      connection-test-query: SELECT 1
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:3000}
      # Cảnh báo leak nếu conn giữ > 20s
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION_MS:20000}
      # Ép PostgreSQL giết query > 30s — lưới an toàn cuối cùng
      connection-init-sql: "SET statement_timeout = '30s'"
      auto-commit: true

  jpa:
    # OSIV disabled (was Spring default `true`). With open-in-view=true a DB connection is pinned to
    # each HTTP request for its ENTIRE lifetime. Long-lived SSE streams — /api/notifications/stream has
    # a 15-min timeout, plus skill-tree / ai-job / speaking streams — then each hold one Hikari
    # connection for the whole stream. ~20 concurrent streams exhaust the pool (max 20/30) → every
    # request incl. /auth/login fails with 503 "db-unavailable ERR-x". That was the 2026-07-09 prod
    # login outage (connections held ~15 min = the SSE timeout, seen in Hikari leak-detection logs).
    # With OSIV off, connections are released right after each query/transaction, so open streams no
    # longer pin them. Safe here: every controller returns DTOs (no entity serialized outside a session).
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false  # PRODUCTION SAFE: never apply out-of-order in prod. Override in application-local.yml for dev.
    encoding: UTF-8

  messages:
    basename: i18n/messages
    encoding: UTF-8
    default-locale: vi

management:
  endpoints:
    web:
      exposure:
        # 'env' removed — it exposes config/topology and is rarely needed in prod.
        # metrics/prometheus/info are ADMIN-gated in SecurityConfig (prod). Re-add 'env' only if
        # truly required, and keep it ADMIN-gated.
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  health:
    # Mail SMTP is optional (password-reset only) and may be unconfigured in some environments.
    # Without it, MailHealthIndicator reports DOWN and drags /actuator/health to DOWN, which
    # blocks blue-green deploy readiness. Mail is non-critical to serving traffic, so exclude it
    # from the health aggregate. Re-enable once SMTP credentials are configured.
    mail:
      enabled: false
    # Redis is non-critical (best-effort rate-limit window + optional L2 cache, both with in-process
    # fallbacks). When the deutschflow-redis container/network link is down, RedisHealthIndicator
    # otherwise drags /actuator/health to DOWN → the Docker healthcheck + blue-green readiness gate
    # both see the node as dead even though it serves traffic fine. Exclude it so a missing Redis
    # never reports the whole API as down. Redis-down stays observable via the rate-limiter WARN log
    # + Prometheus (resilience metrics), not by failing the readiness probe.
    redis:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

# Sentry error tracking. Entirely inert when SENTRY_DSN is unset (dev/CI) — no events, no startup
# change. In prod set SENTRY_DSN; the logback appender then captures ERROR-level logs (incl. the
# GlobalExceptionHandler 500s with their ERR-x reference) as Sentry events.
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:production}
  release: ${SENTRY_RELEASE:}
  # Errors only by default — performance tracing has overhead + Sentry quota cost. Raise to sample traces.
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  # GDPR: don't attach client IP / request body to events by default (German learners' data).
  send-default-pii: false
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

# Inject the per-request correlation id (set in ApiTelemetryFilter's MDC) into every log line.
# Uses Spring Boot's level-pattern hook so the rest of the default console/file layout is untouched
# (and the Sentry logback appender keeps working). Logs now read: "... INFO [<requestId>] ...".
logging:
  pattern:
    level: "%5p [%X{requestId:-}]"

server:
  port: ${SERVER_PORT:8080}
  # graceful = Tomcat waits for active requests to finish before closing;
  # pairs with spring.lifecycle.timeout-per-shutdown-phase above.
  shutdown: graceful
  tomcat:
    threads:
      # P1-6 raised 50→80, but the EC2 app box is t3.medium (2 vCPU) and the RDS pool is 20 — 80
      # threads on 2 cores just thrash and pile up waiters on the pool. 48 fits the hardware (and
      # SSE speaking threads hold a Tomcat thread but NOT a DB connection, so they don't need pool).
      max: ${TOMCAT_MAX_THREADS:48}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:10}
    accept-count: ${TOMCAT_ACCEPT_COUNT:30}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:200}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:20000}
    # -1 = đừng chặn size body: khi Spring từ chối multipart >25MB, Tomcat vẫn đọc hết phần còn lại
    # để trả 413 JSON sạch thay vì reset kết nối (nếu không, client thấy connection reset khó hiểu).
    max-swallow-size: -1
  servlet:
    multipart:
      # Materials Library: nâng 10MB→25MB. Tệp >25MB KHÔNG đi qua backend — dùng presigned PUT thẳng
      # lên S3 (MaterialService.presignUpload). ⚠️ nginx client_max_body_size cũng phải ≥25M (deploy infra).
      max-file-size: 25MB
      max-request-size: 25MB
    encoding:
      charset: UTF-8
      force: true
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024

app:
  async:
    core-pool-size: ${ASYNC_CORE_POOL_SIZE:10}
    max-pool-size: ${ASYNC_MAX_POOL_SIZE:50}
    queue-capacity: ${ASYNC_QUEUE_CAPACITY:100}
  # API telemetry is buffered in-memory and flushed in batches (NOT one INSERT per request — that
  # held a DB connection on every call and starved the Hikari pool). Tune the flush cadence here.
  telemetry:
    flush-interval-ms: ${APP_TELEMETRY_FLUSH_INTERVAL_MS:5000}
  # Nightly purge of unbounded event tables (DataRetentionJob). Keeps telemetry/xp/token-ledger from
  # growing without limit (slows queries + fills RDS storage). Batched deletes, off-peak 03:30.
  retention:
    enabled: ${APP_RETENTION_ENABLED:true}
    cron: ${APP_RETENTION_CRON:0 30 3 * * *}
    telemetry-days: ${APP_RETENTION_TELEMETRY_DAYS:30}
    xp-days: ${APP_RETENTION_XP_DAYS:180}
    token-usage-days: ${APP_RETENTION_TOKEN_DAYS:90}
    batch-size: ${APP_RETENTION_BATCH_SIZE:5000}
    max-rows-per-run: ${APP_RETENTION_MAX_ROWS_PER_RUN:500000}
  cache:
    # Redis L2 cache tier (Caffeine L1 + Redis L2). OFF by default → Caffeine-only. We gate on this
    # explicit flag rather than on spring.data.redis.host (which defaults to localhost, so it's always
    # "set"). Enable in prod where a real Redis is deployed: APP_CACHE_REDIS_L2_ENABLED=true.
    redis-l2-enabled: ${APP_CACHE_REDIS_L2_ENABLED:false}
  flyway:
    # Aligns flyway_schema_history checksums when a versioned migration file changed after apply.
    # SAFE DEFAULT = false (audit D-11/INF-5): auto-repair masks the check that catches an edited
    # already-applied migration — a tampered/rewritten V-script would have its checksum silently
    # realigned instead of failing the deploy. Set APP_FLYWAY_REPAIR_BEFORE_MIGRATE=true only for
    # local dev convenience (Spring Boot 3.2 has no spring.flyway.repair-on-migrate).
    repair-before-migrate: ${APP_FLYWAY_REPAIR_BEFORE_MIGRATE:false}
  jwt:
    # Bắt buộc khi algorithm=HS256. Khi đã chuyển hẳn sang RS256 (sau cutover), có thể BỎ JWT_SECRET
    # (để trống) — JwtService cho phép rỗng nếu algorithm=RS256. Default rỗng để app vẫn start được
    # khi biến môi trường JWT_SECRET đã bị gỡ.
    secret: ${JWT_SECRET:}
    # Zero-downtime key rotation: set JWT_SECRET_PREVIOUS = khóa cũ khi xoay.
    # Sau ≥ 15 phút (access token cũ hết hạn), bỏ biến này đi.
    secret-previous: ${JWT_SECRET_PREVIOUS:}
    access-token-expiry-ms: ${JWT_ACCESS_TOKEN_EXPIRY_MS:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_TOKEN_EXPIRY_MS:604800000}
    # iss + aud claim cho phép hệ thống phân biệt token của đúng service.
    issuer: ${JWT_ISSUER:deutschflow-api}
    audience: ${JWT_AUDIENCE:deutschflow-app}
    # Bật true SAU KHI toàn bộ token cũ (không có iss/aud) đã hết hạn (≥ 15 phút sau deploy).
    require-iss-aud: ${JWT_REQUIRE_ISS_AUD:false}
    # S18 — HS256→RS256 migration. Mặc định HS256 (ký HS256) nhưng VẪN verify RS256 nếu rsa-public-key
    # được set (giai đoạn "verify-both"). Đặt algorithm=RS256 (+ rsa-private-key + rsa-public-key) để ký
    # RS256 và thôi chia sẻ secret ký với web edge. PEM lưu dạng \n-escaped.
    # Xem docs/security/RS256_MIGRATION_PLAN.md.
    algorithm: ${JWT_ALGORITHM:HS256}
    rsa-private-key: ${JWT_RSA_PRIVATE_KEY:}
    rsa-public-key: ${JWT_RSA_PUBLIC_KEY:}
    rsa-public-key-previous: ${JWT_RSA_PUBLIC_KEY_PREVIOUS:}

  security:
    # Số reverse proxy tin cậy đứng trước app (ALB/CloudFront/nginx). Client IP dùng cho rate-limit
    # được đọc từ X-Forwarded-For ở vị trí (len - trusted-proxy-count) tính từ phải — hop do proxy của
    # chính mình thêm vào — nên kẻ tấn công KHÔNG thể giả mạo XFF để né rate-limit.
    # 0 = không có proxy (dùng socket address). 1 = một proxy (mặc định). 2 = CloudFront→ALB.
    trusted-proxy-count: ${APP_SECURITY_TRUSTED_PROXY_COUNT:1}

  # Gói miễn phí cho GV tự do (non-org): hạn mức/ngày cho tính năng AI ĐẮT (checklist D6).
  # Chấm bài text (core) KHÔNG bị cap; chỉ PPTX & OCR-ảnh. GV thuộc org dùng org token-pool.
  free-tier:
    pptx-daily: ${FREE_TIER_PPTX_DAILY:2}
    ocr-daily: ${FREE_TIER_OCR_DAILY:5}

  # Giữ hoạt động demo bán hàng (org sandbox, email @deutschflow-demo.com) ra khỏi
  # COGS/unit-economics tổng hợp để không làm lệch số liệu định giá (checklist next-step #3).
  analytics:
    exclude-demo-data: ${ANALYTICS_EXCLUDE_DEMO_DATA:true}
    demo-email-domain: ${ANALYTICS_DEMO_EMAIL_DOMAIN:@deutschflow-demo.com}

  # Thu tiền B2B qua chuyển khoản VietQR + webhook SePay (checklist C3). api-key trống → webhook
  # fail-closed (từ chối tất cả). bank-* hiển thị hướng dẫn chuyển khoản cho org trên /org/billing.
  payment:
    sepay:
      api-key: ${SEPAY_API_KEY:}
      bank-account: ${SEPAY_BANK_ACCOUNT:}
      bank-name: ${SEPAY_BANK_NAME:}
      account-name: ${SEPAY_ACCOUNT_NAME:}

  auth:
    # Brute-force / abuse guard cho auth endpoints (in-memory sliding window, per node).
    # Bộ đếm nằm trong RAM → restart/redeploy backend sẽ xoá hết (cách gỡ khoá nhanh nhất).
    # Tăng *-max hoặc giảm *-window nếu người dùng thật bị chặn nhầm
    # (vd: nhiều user chung một IP CGNAT của nhà mạng, hoặc QA test đăng ký liên tục).
    rate-limit:
      login-max-per-window: ${APP_AUTH_LOGIN_RL_MAX:5}
      login-window-seconds: ${APP_AUTH_LOGIN_RL_WINDOW:60}
      # Thoáng hơn bản cũ (3 lần / 3600s) — cửa sổ 1 giờ trước đây khoá người gõ nhầm suốt cả giờ.
      register-max-per-window: ${APP_AUTH_REGISTER_RL_MAX:10}
      register-window-seconds: ${APP_AUTH_REGISTER_RL_WINDOW:600}
      refresh-max-per-window: ${APP_AUTH_REFRESH_RL_MAX:10}
      refresh-window-seconds: ${APP_AUTH_REFRESH_RL_WINDOW:60}
      # Quên/đặt lại mật khẩu: chống email-bombing (forgot) và brute-force OTP 6 chữ số (reset).
      # Budget dùng chung theo (IP + email); cửa sổ 900s ≈ TTL của OTP.
      password-reset-max-per-window: ${APP_AUTH_PWRESET_RL_MAX:5}
      password-reset-window-seconds: ${APP_AUTH_PWRESET_RL_WINDOW:900}

  notifications:
    # SSE unread-count stream. Single-node by default; enable Redis pub/sub fan-out
    # for multi-node prod (requires a reachable Redis). Clients reconnect periodically.
    sse:
      timeout-ms: ${APP_NOTIFICATION_SSE_TIMEOUT_MS:900000}
      ping-interval-seconds: ${APP_NOTIFICATION_SSE_PING_SECONDS:20}
      redis-pubsub-enabled: ${APP_NOTIFICATION_SSE_REDIS_PUBSUB:false}
    # Sliding-window limits per user (in-memory); tune if many tabs/aggressive polling.
    rate-limit:
      read-max-per-window: ${APP_NOTIFICATION_READ_RL_MAX:120}
      read-window-seconds: ${APP_NOTIFICATION_READ_RL_WINDOW:60}
      mutate-max-per-window: ${APP_NOTIFICATION_MUTATE_RL_MAX:40}
      mutate-window-seconds: ${APP_NOTIFICATION_MUTATE_RL_WINDOW:60}
      stream-connect-max-per-window: ${APP_NOTIFICATION_SSE_RL_MAX:20}
      stream-connect-window-seconds: ${APP_NOTIFICATION_SSE_RL_WINDOW:60}
    retention:
      enabled: ${APP_NOTIFICATION_RETENTION_ENABLED:true}
      delete-read-older-than-days: ${APP_NOTIFICATION_RETENTION_READ_DAYS:90}
      cron: ${APP_NOTIFICATION_RETENTION_CRON:0 0 4 * * *}

  speaking:
    adaptive:
      # When false: policy is minimal, turn evaluator skips state updates (rollback-friendly).
      enabled: ${APP_SPEAKING_ADAPTIVE_ENABLED:true}
    # SSE chat/stream: Tomcat returns emitter immediately; LLM runs on speakingStreamExecutor.
    sse-emitter-timeout-ms: ${AI_SPEAKING_SSE_TIMEOUT_MS:180000}
    stream-executor:
      core-pool-size: ${AI_SPEAKING_STREAM_CORE:8}
      max-pool-size: ${AI_SPEAKING_STREAM_MAX:20}
      queue-capacity: ${AI_SPEAKING_STREAM_QUEUE:40}

  # AI: local fine-tuned model (deutschflow_model) via Python server; optional Groq for chat fallback + Whisper STT.
  ai:
    # DeutschFlow AI server (loads ./deutschflow_model)
    server-url: ${AI_SERVER_URL:http://localhost:8000}
    timeout-ms: ${AI_SERVER_TIMEOUT_MS:15000}
    # Chat + batch LLM (vocabulary tagging, weekly speaking): local | groq
    chat-provider: ${AI_CHAT_PROVIDER:local}
    # Label stored in AI usage ledger / metrics when provider is LOCAL
    local-model-id: ${AI_LOCAL_MODEL_ID:deutschflow_model}
    
    groq:
      # Optional: only for AI_CHAT_PROVIDER=groq and/or speech-to-text (Whisper).
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
      # Model riêng cho CHẤM BÀI (Schreiben + Sprechen + lead-magnet) — TÁCH HẲN `model` ở trên
      # (speaking real-time cần tốc độ scout-17B). 70B chấm chuẩn hơn ở ngữ pháp/từ vựng; mọi luồng
      # chấm đọc qua GradingModelConfig. Đo bằng /api/admin/grading-eval rồi tinh chỉnh.
      grading-model: ${GROQ_GRADING_MODEL:llama-3.3-70b-versatile}
      whisper-model: ${GROQ_WHISPER_MODEL:whisper-large-v3}
      # Concurrency caps (fair semaphores). Free tier ~30 RPM: chat 3–4; paid/Dev ~10–20 CCU: chat 6–8, whisper 4–6.
      max-concurrent-chat-requests: ${GROQ_MAX_CONCURRENT_CHAT:5}
      max-concurrent-whisper-requests: ${GROQ_MAX_CONCURRENT_WHISPER:4}
      semaphore-acquire-timeout-seconds: ${GROQ_SEMAPHORE_ACQUIRE_SEC:90}
    gemini:
      api-key: ${GEMINI_API_KEY:}
    google:
      service-account-json: ${GOOGLE_SERVICE_ACCOUNT_JSON:}
      slides:
        drive-folder-id: ${GOOGLE_SLIDES_DRIVE_FOLDER_ID:}
    transcribe:
      max-bytes: ${AI_TRANSCRIBE_MAX_BYTES:8388608}
    # Per-user request-rate guard on AI endpoints (request rate, not token spend — the quota
    # wallet remains the cost cap). Whisper at ~$0.006/min means a tight loop is real money.
    rate-limit:
      transcribe-max-per-window: ${APP_AI_TRANSCRIBE_RL_MAX:60}
      transcribe-window-seconds: ${APP_AI_TRANSCRIBE_RL_WINDOW:3600}
      # P1-15: per-user windows for the other cost-bearing AI endpoints (request-rate guard on top of
      # the token wallet). Generous by default so normal speaking practice is never throttled.
      phoneme-max-per-window: ${APP_AI_PHONEME_RL_MAX:60}
      phoneme-window-seconds: ${APP_AI_PHONEME_RL_WINDOW:3600}
      chat-max-per-window: ${APP_AI_CHAT_RL_MAX:180}
      chat-window-seconds: ${APP_AI_CHAT_RL_WINDOW:3600}
      eval-max-per-window: ${APP_AI_EVAL_RL_MAX:60}
      eval-window-seconds: ${APP_AI_EVAL_RL_WINDOW:3600}
      report-max-per-window: ${APP_AI_REPORT_RL_MAX:40}
      report-window-seconds: ${APP_AI_REPORT_RL_WINDOW:3600}
      text-max-per-window: ${APP_AI_TEXT_RL_MAX:120}
      text-window-seconds: ${APP_AI_TEXT_RL_WINDOW:3600}
    # Server TTS — self-hosted Edge TTS sidecar (free Microsoft Neural voices).
    # Empty by default → /api/ai-speaking/tts returns 503 and clients fall back to
    # on-device speech. Point this at your own TTS service to enable persona voices.
    edge-tts:
      url: ${EDGE_TTS_URL:}
    # Streaming TTS — self-hosted XTTS Streaming Voice Server (per-sentence, German).
    # Empty by default → speaking stream omits `audio` events and clients keep their
    # edge-tts / on-device fallback. Persona→voice mapping + presets live in
    # XttsPersonaVoiceResolver (code). See docs/XTTS_STREAMING_API_CONTRACT.md.
    xtts:
      base-url: ${XTTS_BASE_URL:}
      connect-timeout-ms: ${XTTS_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${XTTS_READ_TIMEOUT_MS:15000}
      ngrok-skip-warning: ${XTTS_NGROK_SKIP_WARNING:true}
      seed: ${XTTS_SEED:420}
    # AI cost reporting (admin COGS dashboards). Per-model token tariffs live in
    # AiCostEstimator.java; only the USD→VND rate is tuned here as FX moves.
    cost:
      usd-vnd-rate: ${APP_AI_COST_USD_VND_RATE:25400}

  # OpenAI Whisper STT (for pronunciation evaluation + audio timestamps)
  # Cost: ~$0.006/min. Used by WhisperApiClient.java
  openai:
    api-key: ${OPENAI_API_KEY:}
    whisper-base-url: ${OPENAI_WHISPER_BASE_URL:https://api.openai.com/v1}

  deepl:
    api-key: ${DEEPL_API_KEY:}
    # Gợi ý: DeepL Free ~500.000 ký tự/tháng — import 10k từ + ví dụ có thể vượt quota; dùng
    # app.vocabulary.cefr-curated.deepl-max-chars-per-run và/hoặc tắt enrich-after-upsert cho đợt đầu.

  vocabulary:
    # Prod / staging: cân nhắc đặt GOETHE_*_ON_STARTUP, CEFR_CURATED_*, GLOSBE_* thành false và chạy import qua admin
    # để tránh spike DB + DeepL quota; scheduler Glosbe-VI / Wiktionary vẫn có giới hạn batch-size/delay-ms trong profile.
    # Từ điển TSV trên classpath — không gọi API; mở rộng bằng cách thêm dòng vào file.
    local-lexicon:
      resource: ${LOCAL_LEXICON_RESOURCE:wordlists/local_lexicon.tsv}
    goethe:
      auto-import-on-startup: ${GOETHE_AUTO_IMPORT_ON_STARTUP:true}
      # Wordlist trích từ PDF Goethe (A1/A2/B1) → goethe_official_wordlist.tsv; nạp ví dụ DE + CEFR.
      official-wordlist:
        auto-import-on-startup: ${GOETHE_OFFICIAL_WORDLIST_AUTO_IMPORT:true}
      # classpath = file trong JAR; remote = tải wordlist từ GitHub (HTTP).
      wordlist-source: ${GOETHE_WORDLIST_SOURCE:classpath}
      # local_only = chỉ local_lexicon.tsv; online = DeepL + tuỳ chọn Wiktionary.
      enrich-source: ${GOETHE_ENRICH_SOURCE:local_only}
      enrich-with-deepl: ${GOETHE_ENRICH_WITH_DEEPL:true}
      enrich-with-wiktionary: ${GOETHE_ENRICH_WITH_WIKTIONARY:false}
    # Wordlist theo cấp A1–C1 (~10k), dedup ưu tiên cấp cao; pad từ de_50k nếu thiếu quota.
    cefr-curated:
      # Nạp từ wordlists/cefr_a1_patsy.txt, goethe_sorted.txt, de_50k.txt khi start (sau Goethe + official TSV).
      auto-import-on-startup: ${CEFR_CURATED_AUTO_IMPORT_STARTUP:true}
      # false = không enrich (DeepL) lúc bootstrap; bật true nếu muốn làm đầy nghĩa/ví dụ ngay (chậm, tốn quota).
      auto-import-enrich: ${CEFR_CURATED_AUTO_IMPORT_ENRICH:false}
      target-total: ${CEFR_CURATED_TARGET_TOTAL:10000}
      quota-a1: ${CEFR_CURATED_QUOTA_A1:2000}
      quota-a2: ${CEFR_CURATED_QUOTA_A2:2000}
      quota-b1: ${CEFR_CURATED_QUOTA_B1:2000}
      quota-b2: ${CEFR_CURATED_QUOTA_B2:2000}
      quota-c1: ${CEFR_CURATED_QUOTA_C1:2000}
      # false = chỉ đọc wordlists trên classpath (offline).
      use-remote-sources: ${CEFR_CURATED_REMOTE_SOURCES:false}
      classpath-a1: ${CEFR_CURATED_CLASSPATH_A1:wordlists/cefr_a1_patsy.txt}
      classpath-b1: ${CEFR_CURATED_CLASSPATH_B1:wordlists/goethe_sorted.txt}
      classpath-freq: ${CEFR_CURATED_CLASSPATH_FREQ:wordlists/de_50k.txt}
      classpath-a2: ${CEFR_CURATED_CLASSPATH_A2:}
      classpath-b2: ${CEFR_CURATED_CLASSPATH_B2:}
      classpath-c1: ${CEFR_CURATED_CLASSPATH_C1:}
      url-a1: ${CEFR_CURATED_URL_A1:}
      url-a2: ${CEFR_CURATED_URL_A2:}
      url-b1: ${CEFR_CURATED_URL_B1:}
      url-b2: ${CEFR_CURATED_URL_B2:}
      url-c1: ${CEFR_CURATED_URL_C1:}
      fallback-frequency-url: ${CEFR_CURATED_FREQ_URL:}
      enrich-after-upsert: ${CEFR_CURATED_ENRICH_AFTER_UPSERT:true}
      deepl-max-chars-per-run: ${CEFR_CURATED_DEEPL_MAX_CHARS:450000}
    # Làm đầy words.phonetic từ Wiktionary; resume qua bảng vocabulary_import_state.
    ipa-batch:
      words-per-run: ${IPA_BATCH_WORDS_PER_RUN:200}
      request-delay-ms: ${IPA_BATCH_REQUEST_DELAY_MS:800}
    # Trần từ/request khi ADMIN bấm "Chạy batch" một lần (scheduler không bị đụng nhờ size nhỏ hơn nhiều).
    wiktionary-enrich:
      # Max tối đa mỗi lần admin bấm Chạy Batch (giới hạn 200 để tránh timeout ~200s)
      admin-max-per-batch: ${WIKTIONARY_ENRICH_ADMIN_MAX:200}
    # Tắt mặc định — chỉ chạy định kỳ khi WIKTIONARY_SCHEDULER_ENABLED=true. Admin: POST .../vocabulary/wiktionary/enrich/batch
    wiktionary-scheduler:
      enabled: ${WIKTIONARY_SCHEDULER_ENABLED:false}
      batch-size: ${WIKTIONARY_SCHEDULER_BATCH_SIZE:200}
      delay-ms: ${WIKTIONARY_SCHEDULER_DELAY_MS:5000}
    glosbe:
      enabled: ${GLOSBE_IMPORT_ENABLED:false}
      base-url: ${GLOSBE_BASE_URL:https://vi.glosbe.com/de/vi}
      max-pages-per-run: ${GLOSBE_MAX_PAGES_PER_RUN:30}
      max-words-per-run: ${GLOSBE_MAX_WORDS_PER_RUN:300}
      request-delay-ms: ${GLOSBE_REQUEST_DELAY_MS:400}
      cron: ${GLOSBE_IMPORT_CRON:0 30 2 * * *}
    # Tắt mặc định — chỉ chạy định kỳ khi GLOSBE_VI_ENABLED=true. Admin: POST .../vocabulary/glosbe-vi/enrich/batch
    glosbe-vi:
      enabled: ${GLOSBE_VI_ENABLED:false}
      batch-size: ${GLOSBE_VI_BATCH_SIZE:20}
      # Tăng delay mặc định từ 5000 → 120000ms để tránh scheduler overlap
      delay-ms: ${GLOSBE_VI_DELAY_MS:120000}
      # Giảm admin-max-per-batch để tránh blocking quá lâu
      admin-max-per-batch: ${GLOSBE_VI_ADMIN_MAX:50}
    # LLM DE→VI translation — thay thế Glosbe scraping (stable, no rate-limit risk)
    # Chi phí: ~$0.024 cho 10k từ với GPT-4o-mini
    llm-vi:
      enabled: ${LLM_VI_ENABLED:false}
      batch-size: ${LLM_VI_BATCH_SIZE:50}
      delay-ms: ${LLM_VI_DELAY_MS:60000}
    # Dịch lemma DE → EN + VI qua DeepL cho từ còn thiếu (chạy song song Wiktionary + Glosbe).
    # Tắt production nếu không muốn tiêu quota: DEEPL_LEMMA_BACKFILL_ENABLED=false
    deepl-lemma-backfill:
      enabled: ${DEEPL_LEMMA_BACKFILL_ENABLED:true}
      batch-size: ${DEEPL_LEMMA_BACKFILL_BATCH_SIZE:25}
      max-chars-per-run: ${DEEPL_LEMMA_BACKFILL_MAX_CHARS:12000}
      delay-ms-between-words: ${DEEPL_LEMMA_BACKFILL_WORD_DELAY_MS:250}
      delay-ms: ${DEEPL_LEMMA_BACKFILL_TICK_MS:8000}
    enrichment-auto-stop-enabled: ${APP_VOCAB_ENRICHMENT_AUTO_STOP:true}
    enrichment-auto-stop-min-total-words: ${APP_VOCAB_ENRICHMENT_AUTO_STOP_MIN_WORDS:10000}
    enrichment-auto-stop-scan-ms: ${APP_VOCAB_ENRICHMENT_AUTO_STOP_SCAN_MS:90000}
    deepl-free-monthly-char-cap: ${DEEPL_FREE_MONTHLY_CHAR_CAP:490000}
    strict-free-mode: ${APP_VOCAB_STRICT_FREE:true}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  # Base URL của web, dùng để dựng link nhúng vào EMAIL (hiện là link mời vào tổ chức).
  # Tách riêng khỏi `cors.allowed-origins`: trước đây link mời lấy origin ĐẦU TIÊN của danh sách CORS,
  # nên chỉ cần đổi THỨ TỰ các origin trong CORS_ALLOWED_ORIGINS là domain trong email đổi theo — một
  # cái bẫy im lặng.
  # Không đặt WEB_URL thì rơi về đúng hành vi cũ (origin đầu của CORS), nên KHÔNG cần thêm env nào
  # trước khi deploy. Fallback viết ngay ở đây, không ở @Value: nếu khai `${WEB_URL:}` thì khi thiếu
  # env Spring trả CHUỖI RỖNG (không phải "thiếu khoá"), và fallback bên @Value sẽ không bao giờ chạy.
  web-url: ${WEB_URL:${CORS_ALLOWED_ORIGINS:http://localhost:3000}}

# ============================================================
# Payment Gateway — MoMo
#
# Production: set MOMO_* environment variables on EC2 (docker-compose.prod.yml)
# Local dev:  set credentials in application-local.yml (gitignored)
#
# SECURITY: No hardcoded fallback defaults here.
# Missing env var → Spring throws BeanCreationException at startup (fail-fast).
# → prevents accidentally running production with sandbox keys.
# ============================================================
payment:
  momo:
    partner-code: ${MOMO_PARTNER_CODE:dummy}
    access-key: ${MOMO_ACCESS_KEY:dummy}
    secret-key: ${MOMO_SECRET_KEY:dummy}
    api-endpoint: ${MOMO_API_ENDPOINT:http://localhost:8080/dummy}
    ipn-url: ${MOMO_IPN_URL:https://mydeutschflow.com/api/payments/momo/ipn}
    # Trang người dùng được ví MoMo đá về sau khi thanh toán. Trỏ vào giao diện v2: trang /payment/success
    # của cây v1 sắp bị xoá (plans/2026-07-14-xoa-sach-v1-web.md). MoMo hiện DISABLED (khoá mặc định là
    # "dummy" → MomoPaymentService tự tắt), nên đây chỉ là dọn dẹp để default không trỏ vào route sắp chết.
    # Nếu bật lại MoMo thì phải làm trang xử lý `?momo=success` ở v2 trước.
    return-url: ${MOMO_RETURN_URL:https://mydeutschflow.com/v2/payment?momo=success}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    # Tương tự: /student/pricing thuộc cây v1 sắp xoá. Stripe cũng đang DISABLED (STRIPE_SECRET_KEY rỗng
    # → StripePaymentService log cảnh báo rồi tự tắt). Trang thanh toán của v2 là /v2/payment.
    success-url: ${STRIPE_SUCCESS_URL:https://mydeutschflow.com/v2/payment?stripe=success}
    cancel-url: ${STRIPE_CANCEL_URL:https://mydeutschflow.com/v2/payment?stripe=cancel}
  apple:
    # Apple StoreKit IAP. Apple Root CA is baked into the image (/app/apple-certs, see backend/Dockerfile),
    # so verification is ENABLED by default. Override any of these via env if needed.
    bundle-id: ${APPLE_BUNDLE_ID:com.cudinh.mydeutschflow} # MUST match the app's real bundle id (mobile/app.json)
    app-apple-id: ${APPLE_APP_APPLE_ID:6785281013} # numeric App Store id — REQUIRED for Production verification
    environment: ${APPLE_IAP_ENVIRONMENT:Production} # PRIMARY environment tried first; the verifier auto-falls-back to the other (Sandbox↔Production) on env-mismatch, so real buyers AND TestFlight both work
    root-cert-dir: ${APPLE_ROOT_CERT_DIR:/app/apple-certs} # Apple Root CA G3 baked into image
    online-checks: ${APPLE_IAP_ONLINE_CHECKS:false} # OCSP revocation; set true in Production

# ============================================================
# Resilience4j circuit breakers — outbound AI calls (see common/resilience/CircuitBreakers.java).
# When an upstream is failing, the breaker OPENs and calls fail FAST (friendly error) instead of
# each request eating the full HTTP timeout. Auto-recovers via half-open probes. Metrics on
# /actuator/prometheus (resilience4j_circuitbreaker_state).
# ============================================================
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 4          # need ≥4 calls before evaluating the failure rate
        failure-rate-threshold: 50          # ≥50% failures → OPEN
        wait-duration-in-open-state: 30s    # stay OPEN 30s, then probe
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      aiServer:
        base-config: default
      groqChat:
        base-config: default
      groqWhisper:
        base-config: default
