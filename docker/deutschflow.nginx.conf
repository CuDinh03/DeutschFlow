# ============================================================
# Nginx Reverse Proxy — DeutschFlow Production
#
# Cài đặt trên EC2:
#   sudo apt install nginx certbot python3-certbot-nginx -y
#   sudo cp deutschflow.nginx.conf /etc/nginx/sites-available/deutschflow
#   sudo ln -s /etc/nginx/sites-available/deutschflow /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Sau đó cài SSL (thay tên miền thật vào):
#   sudo certbot --nginx -d deutschflow.com -d www.deutschflow.com -d api.deutschflow.com
# ============================================================

# ── Frontend: deutschflow.com ────────────────────────────────
server {
    listen 80;
    server_name mydeutschflow.com www.mydeutschflow.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mydeutschflow.com www.mydeutschflow.com;

    # Certbot sẽ tự điền 2 dòng ssl_certificate này
    # ssl_certificate /etc/letsencrypt/live/mydeutschflow.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mydeutschflow.com/privkey.pem;

    # Tăng cường bảo mật TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "microphone=(self), camera=()";

    # Giới hạn upload size (cho STT audio recording)
    client_max_body_size 16M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Backend API: api.mydeutschflow.com ──────────────────────
server {
    listen 80;
    server_name api.mydeutschflow.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.mydeutschflow.com;

    # ssl_certificate /etc/letsencrypt/live/api.mydeutschflow.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.mydeutschflow.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Upload multipart qua backend: Materials Library nâng lên 25MB (khớp spring.servlet.multipart).
    # Tệp >25MB KHÔNG đi qua đây — client PUT thẳng lên S3 bằng presigned URL. Nếu để 10M thì nginx
    # 413 trước khi request tới Spring và handler MaxUploadSizeExceeded không bao giờ chạy.
    client_max_body_size 25M;

    # Actuator: chặn endpoint quản trị khỏi internet (defense-in-depth, audit INF-2).
    # Chỉ để hở /actuator/health cho uptime monitor ngoài (chỉ trả status khi chưa auth);
    # env/metrics/prometheus/info... đã ADMIN-gate ở app — chặn thêm ở edge cho chắc.
    # (Prometheus container scrape backend:8080 qua mạng Docker nội bộ, KHÔNG qua nginx → không ảnh hưởng.)
    location = /actuator/health {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /actuator/ {
        deny all;
    }

    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) — cần tắt buffering để stream realtime
        proxy_buffering off;
        proxy_read_timeout 90s;  # Đủ cho SSE long-polling
    }
}
