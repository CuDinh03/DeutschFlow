# ============================================================
# Nginx Reverse Proxy — DeutschFlow Production
#
# Cài đặt trên EC2:
#   sudo apt install nginx certbot python3-certbot-nginx -y
#   sudo cp deutschflow.nginx.conf /etc/nginx/sites-available/deutschflow
#   sudo ln -s /etc/nginx/sites-available/deutschflow /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Sau đó cài SSL (thay tên miền thật vào):
#   sudo certbot --nginx -d deutschflow.com -d www.deutschflow.com -d api.deutschflow.com
# ============================================================

# ── Frontend: deutschflow.com ────────────────────────────────
server {
    listen 80;
    server_name deutschflow.com www.deutschflow.com;

    # Sau khi chạy certbot, nó sẽ tự động thêm block HTTPS ở đây
    # Tạm thời redirect tất cả về HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name deutschflow.com www.deutschflow.com;

    # Certbot sẽ tự điền 2 dòng ssl_certificate này
    # ssl_certificate /etc/letsencrypt/live/deutschflow.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/deutschflow.com/privkey.pem;

    # Tăng cường bảo mật TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "microphone=(self), camera=()";

    # Giới hạn upload size (cho STT audio recording)
    client_max_body_size 16M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Backend API: api.deutschflow.com ────────────────────────
server {
    listen 80;
    server_name api.deutschflow.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.deutschflow.com;

    # ssl_certificate /etc/letsencrypt/live/api.deutschflow.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.deutschflow.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Upload cho audio STT (Groq Whisper): tối đa 8MB như trong application.yml
    client_max_body_size 10M;

    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) — cần tắt buffering để stream realtime
        proxy_buffering off;
        proxy_read_timeout 90s;  # Đủ cho SSE long-polling
    }
}
