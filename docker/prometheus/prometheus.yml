global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

# Send firing alerts to Alertmanager (which fans them out to Telegram/Slack/email).
# Without this block, the rules in alert.rules.yml fire but go nowhere — which is why
# the DB-pool exhaustion incident produced no notification.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'deutschflow-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
