groups:
  - name: deutschflow_alerts
    rules:
      - alert: HighAiLatency
        expr: http_server_requests_seconds_max{uri=~"/api/speaking.*"} > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High AI Latency detected"
          description: "AI Speaking API latency is greater than 5 seconds for the last 1 minute."

      - alert: DbPoolExhausted
        expr: hikaricp_connections_pending > 0 or hikaricp_connections_active == hikaricp_connections_max
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Database Connection Pool Exhausted"
          description: "There are pending connection requests or all DB connections are currently in use."

      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP Error Rate"
          description: "More than 5% of requests are returning 5xx status codes over the last 2 minutes."
