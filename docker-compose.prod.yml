# ============================================================
# docker-compose.prod.yml — DeutschFlow Production Stack
# Dùng trên AWS EC2 (KHÔNG bao gồm Postgres — dùng Amazon RDS)
#
# Khởi động:
#   docker compose -f docker-compose.prod.yml up -d
# Tắt:
#   docker compose -f docker-compose.prod.yml down
# Xem log:
#   docker compose -f docker-compose.prod.yml logs -f
# ============================================================

version: '3.8'

services:
  # ── Spring Boot Backend ──────────────────────────────────
  backend:
    image: deutschflow-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deutschflow-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.production    # File thật (không commit). MoMo sandbox: tham khảo env.momo.sandbox.example ở root repo
    environment:
      # Override DB host về RDS (đọc từ .env.production)
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - AI_CHAT_PROVIDER=${AI_CHAT_PROVIDER}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_LUKAS=${ELEVENLABS_VOICE_LUKAS}
      - ELEVENLABS_VOICE_EMMA=${ELEVENLABS_VOICE_EMMA}
      - ELEVENLABS_VOICE_ANNA=${ELEVENLABS_VOICE_ANNA}
      - ELEVENLABS_VOICE_KLAUS=${ELEVENLABS_VOICE_KLAUS}
      # Tắt vocab auto-import khi startup (tránh spike CPU khi restart)
      - GOETHE_AUTO_IMPORT_ON_STARTUP=false
      - GOETHE_OFFICIAL_WORDLIST_AUTO_IMPORT=false
      - CEFR_CURATED_AUTO_IMPORT_STARTUP=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # Cho Spring Boot đủ thời gian khởi động
    networks:
      - deutschflow-net

  # ── Next.js Frontend ─────────────────────────────────────
  frontend:
    image: deutschflow-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Backend URL mà frontend gọi API (nội bộ container: dùng service name)
        NEXT_PUBLIC_BACKEND_URL: http://backend:8080
        # PostHog Analytics — truyền vào lúc build để Next.js bundle được
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
    container_name: deutschflow-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Nếu Next.js cần gọi backend qua internal network
      - BACKEND_URL=http://backend:8080
      # PostHog (runtime fallback)
      - NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY}
      - NEXT_PUBLIC_POSTHOG_HOST=${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - deutschflow-net

  # ── Observability Stack ──────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: deutschflow-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - deutschflow-net

  loki:
    image: grafana/loki:3.0.0
    container_name: deutschflow-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - deutschflow-net

  promtail:
    image: grafana/promtail:3.0.0
    container_name: deutschflow-promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./docker/promtail:/etc/promtail
    command: -config.file=/etc/promtail/config.yml
    networks:
      - deutschflow-net

  grafana:
    image: grafana/grafana:latest
    container_name: deutschflow-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - deutschflow-net

networks:
  deutschflow-net:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
