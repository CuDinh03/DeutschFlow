version: 1
# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED Environment Variables (set in Amplify Console → App settings → Env vars)
# ──────────────────────────────────────────────────────────────────────────────
# JWT_SECRET               — MUST match backend production JWT_SECRET exactly.
#                            Without this, Next.js middleware cannot verify tokens
#                            and ALL users will be redirected back to /login.
# NEXT_PUBLIC_BACKEND_URL  — e.g. https://api.mydeutschflow.com
# NEXT_PUBLIC_CLOUDFRONT_URL — e.g. https://dxxxxx.cloudfront.net
# NEXT_PUBLIC_POSTHOG_KEY  — PostHog analytics key
# NEXT_PUBLIC_POSTHOG_HOST — e.g. https://us.i.posthog.com
# ──────────────────────────────────────────────────────────────────────────────
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            # Fail early if JWT_SECRET is not configured — prevents silent auth breakage
            - |
              if [ -z "$JWT_SECRET" ]; then
                echo "ERROR: JWT_SECRET is not set. Amplify build aborted."
                echo "Set JWT_SECRET in Amplify Console → App settings → Environment variables."
                exit 1
              fi
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          # Next.js incremental build cache — reduces compile time significantly
          - .next/cache/**/*
          # npm offline cache — speeds up npm ci
          - .npm/**/*
          # node_modules — avoid full re-download on unchanged dependencies
          - node_modules/**/*
    appRoot: frontend
