version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - NEXT_PUBLIC_BACKEND_URL=https://api.mydeutschflow.com npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          # Next.js incremental build cache — reduces compile time significantly
          - .next/cache/**/*
          # npm offline cache — speeds up npm ci
          - .npm/**/*
          # node_modules — avoid full re-download on unchanged dependencies
          - node_modules/**/*
    appRoot: frontend
