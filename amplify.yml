version: 1
# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED Environment Variables (set in Amplify Console → App settings → Env vars)
# ──────────────────────────────────────────────────────────────────────────────
# JWT verifier (set ONE):
#   JWT_SECRET             — HS256: MUST match backend JWT_SECRET exactly. (legacy)
#   JWT_RSA_PUBLIC_KEY     — RS256: backend's RSA public key (\n-escaped PEM). After the RS256
#                            cutover, remove JWT_SECRET and keep only this. (preferred)
#   Without either, the middleware cannot verify tokens and users get redirected to /login.
# NEXT_PUBLIC_BACKEND_URL  — e.g. https://api.mydeutschflow.com
# NEXT_PUBLIC_CLOUDFRONT_URL — e.g. https://dxxxxx.cloudfront.net
# NEXT_PUBLIC_POSTHOG_KEY  — PostHog analytics key
# NEXT_PUBLIC_POSTHOG_HOST — e.g. https://us.i.posthog.com
# ──────────────────────────────────────────────────────────────────────────────
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            # Fail early if NO JWT verifier is configured — need JWT_SECRET (HS256) OR
            # JWT_RSA_PUBLIC_KEY (RS256). Prevents silent auth breakage.
            - |
              if [ -z "$JWT_SECRET" ] && [ -z "$JWT_RSA_PUBLIC_KEY" ]; then
                echo "ERROR: neither JWT_SECRET nor JWT_RSA_PUBLIC_KEY is set. Amplify build aborted."
                echo "Set one in Amplify Console → App settings → Environment variables (RS256 uses JWT_RSA_PUBLIC_KEY)."
                exit 1
              fi
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          # Next.js incremental build cache — reduces compile time significantly
          - .next/cache/**/*
          # npm offline cache — speeds up npm ci
          - .npm/**/*
          # node_modules — avoid full re-download on unchanged dependencies
          - node_modules/**/*
    appRoot: frontend
