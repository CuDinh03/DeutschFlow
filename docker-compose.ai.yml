version: '3.8'

services:
  # AI Model Server (Python FastAPI)
  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: deutschflow-ai-server
    ports:
      - "8000:8000"
    volumes:
      - ./deutschflow_model:/app/deutschflow_model:ro
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - DEUTSCHFLOW_MODEL_PATH=/app/deutschflow_model
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - deutschflow-network

  # Java Backend (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deutschflow-backend
    ports:
      - "8080:8080"
    environment:
      - AI_SERVER_URL=http://ai-server:8000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-deutschflow}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - ai-server
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    networks:
      - deutschflow-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: deutschflow-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-deutschflow}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - deutschflow-network

volumes:
  postgres-data:

networks:
  deutschflow-network:
    driver: bridge
