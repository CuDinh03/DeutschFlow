name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Backend: build + test (Java 17 + Maven + H2 in-memory)
  # ──────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Java 17 + Maven)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Create minimal .env for CI
        run: |
          cat > .env <<'EOF'
          DB_HOST=localhost
          DB_PORT=3306
          DB_NAME=deutschflow_test
          DB_USERNAME=ci_user
          DB_PASSWORD=ci_password
          JWT_SECRET=ci-test-secret-at-least-32-characters-long
          OPENAI_API_KEY=
          GROQ_API_KEY=
          GEMINI_API_KEY=
          AI_PROVIDER=groq
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          EOF

      - name: Build and test
        working-directory: backend
        run: ./mvnw verify --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────────
  # Frontend: lint + build (Node.js 20 + npm)
  # ──────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080

  # ──────────────────────────────────────────────────────────────────────────────
  # Security: check for hardcoded secrets
  # ──────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
