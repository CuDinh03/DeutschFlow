name: Mobile CI

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check-and-test:
    name: 🧪 Type Check & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install Dependencies
        working-directory: ./mobile
        run: npm ci

      - name: TypeScript Compile Check
        working-directory: ./mobile
        run: npx tsc --noEmit

      - name: Unit Tests
        working-directory: ./mobile
        run: npm test
