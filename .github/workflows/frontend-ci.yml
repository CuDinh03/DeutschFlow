name: Frontend CI

on:
  push:
    branches: [ "master", "main", "dev" ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ "master", "main", "dev" ]
    paths:
      - 'frontend/**'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: TypeScript Compile Check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: ESLint Check
        working-directory: ./frontend
        run: npm run lint

      - name: i18n Hardcoded String Check
        run: |
          chmod +x scripts/i18n/check_i18n.py
          ./scripts/i18n/check_i18n.py || (echo "i18n Check Failed: Hardcoded strings found! Please extract them using t() hook." && exit 1)
