# XcodeGen project spec for the native iOS app shell. Regenerate with: `xcodegen generate`.
#
# Two targets:
#   - DeutschFlowApp  (SwiftUI app, iOS 17+)
#   - DeutschFlowKit   (local Swift package dependency — already verified by `swift test`)

name: DeutschFlowApp
options:
  bundleIdPrefix: com.deutschflow
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""           # set by Xcode signing once team is configured
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  DeutschFlowKit:
    path: DeutschFlowKit
targets:
  DeutschFlowApp:
    type: application
    platform: iOS
    sources:
      - path: DeutschFlowApp/Sources
    dependencies:
      - package: DeutschFlowKit
    info:
      path: DeutschFlowApp/Info.plist
      properties:
        CFBundleDisplayName: DeutschFlow
        UILaunchScreen: {}
        # Backend base URL — patch per build configuration (dev/staging/prod) once schemes exist.
        APIBaseURL: https://api.mydeutschflow.com
        # In-App Purchase capability is enabled automatically by StoreKit usage; APS / mic / etc. added later.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deutschflow.app
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
